<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roommates | FairSplit</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-item">
                <a href="index.html" class="nav-link">
                    <img src="images/icon-balances.svg" alt="" class="nav-icon">
                    Balances
                </a>
            </div>
            <div class="nav-item">
                <a href="roommates.html" class="nav-link">
                    <img src="images/icon-balances.svg" alt="" class="nav-icon">
                    Roommates
                </a>
            </div>
            <div class="nav-item">
                <a href="add-expense.html" class="nav-link">
                    <img src="images/icon-add.svg" alt="" class="nav-icon">
                    Add Expense
                </a>
            </div>
            <div class="nav-item">
                <a href="history.html" class="nav-link">
                    <img src="images/icon-history.svg" alt="" class="nav-icon">
                    History
                </a>
            </div>
        </div>
    </nav>

    <header>
        <div class="hero-banner">
            <div class="hero-copy">
                <span class="eyebrow">Roommate expense tracker</span>
                <h1>FairSplit</h1>
                <p>Keep shared living simple with clear balances, fast expense logging, and friendly settlement insights.</p>
                <div class="hero-stats">
                    <div>
                        <strong>4x faster</strong>
                        <span>Expense split time</span>
                    </div>
                    <div>
                        <strong>100%</strong>
                        <span>Shared transparency</span>
                    </div>
                </div>
            </div>
            <figure class="hero-figure">
                <img src="images/hero-illustration.svg" alt="Shared expense illustration">
            </figure>
        </div>
    </header>

    <section id="roommates" class="page-section">
        <div class="section-container">
            <h2>Manage Roommates</h2>
            <div class="roommate-search-bar">
                <input type="text" id="roommateSearch" placeholder="Search roommates...">
            </div>
            <div class="roommate-input-group">
                <input type="text" id="roommateName" placeholder="Enter roommate name">
                <button id="addRoommateBtn">Add Roommate</button>
            </div>
            <div id="roommateList" class="roommate-grid"></div>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/roommates.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
