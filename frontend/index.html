<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairSplit | Roommate Expense Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-item">
                <a href="index.html" class="nav-link">
                    <img src="images/icon-balances.svg" alt="" class="nav-icon">
                    Balances
                </a>
            </div>
            <div class="nav-item">
                <a href="roommates.html" class="nav-link">
                    <img src="images/icon-balances.svg" alt="" class="nav-icon">
                    Roommates
                </a>
            </div>
            <div class="nav-item">
                <a href="add-expense.html" class="nav-link">
                    <img src="images/icon-add.svg" alt="" class="nav-icon">
                    Add Expense
                </a>
            </div>
            <div class="nav-item">
                <a href="history.html" class="nav-link">
                    <img src="images/icon-history.svg" alt="" class="nav-icon">
                    History
                </a>
            </div>
        </div>
    </nav>
    <header>
        <div class="hero-banner">
            <div class="hero-copy">
                <span class="eyebrow">Roommate expense tracker</span>
                <h1>FairSplit</h1>
                <p>Keep shared living simple with clear balances, fast expense logging, and friendly settlement insights.</p>
                <div class="hero-stats">
                    <div>
                        <strong>4x faster</strong>
                        <span>Expense split time</span>
                    </div>
                    <div>
                        <strong>100%</strong>
                        <span>Shared transparency</span>
                    </div>
                </div>
            </div>
            <figure class="hero-figure">
                <img src="images/hero-illustration.svg" alt="Shared expense illustration">
            </figure>
        </div>
    </header>

    <main class="container">
    <section id="balances">
        <h2>Current Balances</h2>
        
        <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem;">
            <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                <input id="balanceSearch" type="text" placeholder="Search roommate..." style="padding: 0.75rem 1rem; border: 1px solid rgba(78, 165, 101, 0.24); border-radius: 12px; background: #f8fbf7; color: var(--text); flex: 1; min-width: 250px;" />
                <button id="clearBalanceSearch" style="padding: 0.75rem 1.5rem; background: var(--primary-soft); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Clear</button>
            </div>
            
            <div id="chartContainer" style="display: none; max-width: 400px; margin: 0;">
                <canvas id="balanceChart"></canvas>
            </div>
        </div>

        <div id="balanceList" class="card-grid"></div>
    </section>
</main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/balances.js"></script>
    <script src="js/roommates.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
